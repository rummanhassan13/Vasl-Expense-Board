<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vasl · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  --bg:#f5f0e6;--bg2:#fdfaf4;--wine:#3c060d;--gold:#bf933e;--green:#1c4a35;--noir:#110509;
  --border:rgba(191,147,62,0.18);--border2:rgba(191,147,62,0.10);--text:#3c060d;--text2:rgba(60,6,13,0.55);
  --text3:rgba(60,6,13,0.35);--row:rgba(60,6,13,0.015);--card:#fdfaf4;--shadow:rgba(17,5,9,0.08);
  --danger:#a82020;--dangerBg:rgba(168,32,32,0.06);
  --font-d:'Cormorant Garamond',Georgia,serif;--font-b:'DM Sans',sans-serif;--header-h:56px;
}
[data-theme="dark"]{
  --bg:#110509;--bg2:#1a0a10;--wine:#f5f0e6;--gold:#d4a94e;--green:#2a7a55;--noir:#f5f0e6;
  --border:rgba(212,169,78,0.18);--border2:rgba(212,169,78,0.08);--text:#f2e8d5;--text2:rgba(242,232,213,0.55);
  --text3:rgba(242,232,213,0.35);--row:rgba(242,232,213,0.02);--card:#1e0c14;--shadow:rgba(0,0,0,0.3);
  --danger:#f87171;--dangerBg:rgba(248,113,113,0.1);
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:13px;}
input,select,textarea,button{font-family:var(--font-b);}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(191,147,62,0.25);border-radius:3px;}
select option{background:var(--card);color:var(--text);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .desktop-tabs{display:none!important;}.mobile-menu-btn{display:flex!important;}
  .main-content{padding:14px!important;}.grid-4{grid-template-columns:1fr 1fr!important;}
  .grid-2col{grid-template-columns:1fr!important;}.header-inner{padding:0 12px!important;}
  .stat-cards{grid-template-columns:1fr 1fr!important;}.kanban-cols{grid-template-columns:1fr!important;}
  .cal-grid{grid-template-columns:repeat(7,1fr)!important;font-size:10px!important;}
  .filter-bar,.pill-row{flex-wrap:wrap!important;}
  .pill-row button{padding:5px 9px!important;font-size:10px!important;}
  .overview-bottom{grid-template-columns:1fr!important;}
  .cat-resp{grid-template-columns:1fr 1fr!important;}
  .exp-tbl table{min-width:520px!important;}.form-2col{grid-template-columns:1fr!important;}
}
@media(max-width:480px){
  .grid-4,.stat-cards{grid-template-columns:1fr!important;}
  .cat-resp{grid-template-columns:1fr!important;}.pill-row button{padding:5px 8px!important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const SUPABASE_URL="https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON_KEY="YOUR_ANON_KEY";
const CLOUDINARY_CLOUD="YOUR_CLOUD_NAME";
const CLOUDINARY_PRESET="YOUR_UPLOAD_PRESET";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const pkr=n=>"Rs. "+Math.abs(Number(n||0)).toLocaleString("en-PK",{maximumFractionDigits:0});
const fmtDate=d=>{if(!d)return"—";const dt=new Date(d+"T00:00:00");return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});};
const fmtShort=d=>{if(!d)return"—";const dt=new Date(d+"T00:00:00");return dt.toLocaleDateString("en-GB",{day:"numeric",month:"short"});};
const today=()=>new Date().toISOString().slice(0,10);
const nowYM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
const TEAM=["Rumman","Sajawal","Bilal"];
const teamColor={Rumman:"#3c060d",Sajawal:"#1c4a35",Bilal:"#bf933e"};
const logActivity=async(action,module,detail,email)=>{try{await sb.from("activity_log").insert({action,module,detail,user_email:email});}catch(e){}};
async function uploadToCloudinary(file){
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLOUDINARY_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:"POST",body:fd});
  const data=await res.json();if(!data.secure_url)throw new Error(data.error?.message||"Upload failed");
  return data.secure_url;
}
const I={
  spend:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
  cal:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  plus:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>,
  x:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  trash:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>,
  edit:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  check:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>,
  sync:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>,
  spinner:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{animation:"spin 0.8s linear infinite",display:"block"}}><path d="M21 12a9 9 0 11-6.22-8.56"/></svg>,
  moon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>,
  sun:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>,
  menu:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>,
  log:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>,
  lock:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
  truck:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 4v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  grid:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
  home:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>,
  img:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>,
  warn:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
};
const S={
  input:{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:7,padding:"10px 13px",fontSize:13,color:"var(--text)",outline:"none"},
  select:{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:7,padding:"10px 13px",fontSize:13,color:"var(--text)",outline:"none",cursor:"pointer"},
  filterSel:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:6,padding:"8px 12px",fontSize:12,color:"var(--text)",outline:"none",cursor:"pointer"},
  btn:{background:"var(--gold)",color:"var(--noir)",border:"none",borderRadius:7,padding:"10px 18px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6},
  btnO:{background:"transparent",border:"1px solid var(--border)",borderRadius:7,padding:"10px 18px",fontSize:13,color:"var(--text2)",cursor:"pointer"},
  lbl:{display:"block",fontSize:10,fontWeight:600,letterSpacing:1,textTransform:"uppercase",color:"var(--text3)",marginBottom:6},
  sec:{fontSize:10,fontWeight:600,letterSpacing:2,textTransform:"uppercase",color:"var(--text3)",marginBottom:12},
  th:{padding:"11px 14px",fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",color:"rgba(245,240,230,0.5)",whiteSpace:"nowrap",textAlign:"left"},
  td:{padding:"11px 14px",fontSize:13,color:"var(--text)",borderBottom:"1px solid var(--border2)"},
};
const catBadge={
  Marketing:{bg:"rgba(191,147,62,0.11)",text:"#7a5a0a"},Manufacturing:{bg:"rgba(60,6,13,0.09)",text:"#3c060d"},
  Packaging:{bg:"rgba(28,74,53,0.10)",text:"#1a4230"},Logistics:{bg:"rgba(140,100,20,0.10)",text:"#6b4a08"},
  Operations:{bg:"rgba(90,20,35,0.08)",text:"#5c1a28"},"R&D":{bg:"rgba(28,74,53,0.14)",text:"#0d3020"},
  Other:{bg:"rgba(100,80,60,0.08)",text:"#5a4a42"},Content:{bg:"rgba(191,147,62,0.11)",text:"#7a5a0a"},
  Finance:{bg:"rgba(140,100,20,0.10)",text:"#6b4a08"},Legal:{bg:"rgba(90,20,35,0.08)",text:"#5c1a28"},
};
/* ── TABS (new order, creatives/ideas/inventory removed) ── */
const TABS=[
  {id:"tasks",label:"Tasks"},{id:"calendar",label:"Calendar"},{id:"launch",label:"Launch"},
  {id:"orders",label:"Orders"},{id:"expenses",label:"Expenses"},{id:"overview",label:"Overview"},
];
/* ── SHARED COMPONENTS ── */
function Modal({open,onClose,title,sub,children,width}){
  if(!open)return null;
  return(<div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(17,5,9,0.6)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:14,padding:"28px 26px",width:"100%",maxWidth:width||440,boxShadow:"0 24px 80px var(--shadow)",animation:"fadeIn 0.2s ease",maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
        <div><div style={{fontFamily:"var(--font-d)",fontSize:22,fontWeight:600,lineHeight:1.1}}>{title}</div>{sub&&<div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{sub}</div>}</div>
        <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)",padding:4,display:"flex"}}>{I.x}</button>
      </div>
      <div style={{height:1,background:"var(--border)",margin:"16px 0"}}/>
      {children}
    </div>
  </div>);
}
function Toast({toast}){
  if(!toast)return null;
  return(<div style={{position:"fixed",bottom:20,right:20,background:toast.type==="warn"?"var(--danger)":"var(--green)",color:"#f5f0e6",padding:"11px 18px",borderRadius:8,fontSize:13,fontWeight:500,zIndex:300,boxShadow:"0 4px 24px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",gap:8,animation:"fadeIn 0.2s ease",maxWidth:340}}>
    <span style={{width:6,height:6,borderRadius:"50%",background:toast.type==="warn"?"#fca5a5":"var(--gold)",flexShrink:0}}/>{toast.msg}
  </div>);
}
function SCard({icon,label,accent,children}){
  return(<div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"18px 20px",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:accent||"var(--gold)",borderRadius:"10px 0 0 10px"}}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
      <span style={{fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)"}}>{label}</span>
      <span style={{color:"var(--text3)",opacity:0.5}}>{icon}</span>
    </div>
    {children}
  </div>);
}
function SVal({children,style}){return <div style={{fontFamily:"var(--font-d)",fontSize:26,fontWeight:600,lineHeight:1.1,marginBottom:4,...style}}>{children}</div>;}
function SSub({children,style}){return <div style={{fontSize:11,color:"var(--text3)",...style}}>{children}</div>;}
function Badge({label,bg,color}){return <span style={{display:"inline-flex",padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:500,background:bg||"rgba(191,147,62,0.11)",color:color||"#7a5a0a",whiteSpace:"nowrap"}}>{label}</span>;}
function Avatar({name,size}){
  const s=size||26;if(!name)return null;
  return <div style={{width:s,height:s,borderRadius:"50%",background:teamColor[name]||"var(--gold)",color:"#f5f0e6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:s*0.38,fontWeight:600,flexShrink:0,border:"1.5px solid var(--border)"}}>{name[0]}</div>;
}
function FF({label,children}){return <div style={{marginBottom:14}}><label style={S.lbl}>{label}</label>{children}</div>;}
function EmptyState({msg}){return <div style={{padding:"50px 20px",textAlign:"center"}}><div style={{fontFamily:"var(--font-d)",fontSize:20,color:"var(--text3)"}}>{msg}</div></div>;}
/* ── LOGIN ── */
function LoginScreen(){
  const[email,setEmail]=useState("");const[pass,setPass]=useState("");const[err,setErr]=useState("");const[loading,setLoad]=useState(false);
  const handle=async()=>{
    if(!email||!pass)return setErr("Enter email and password.");
    setLoad(true);setErr("");
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)setErr(error.message);setLoad(false);
  };
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"var(--bg)",padding:20}}>
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:"40px 32px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px var(--shadow)",textAlign:"center"}}>
      <div style={{fontFamily:"var(--font-d)",fontSize:38,color:"var(--gold)",letterSpacing:3,fontWeight:600,marginBottom:4}}>وصل</div>
      <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:"var(--text3)",marginBottom:28}}>Command Center</div>
      <FF label="Email"><input type="email" value={email} onChange={e=>setEmail(e.target.value)} style={S.input} placeholder="admin@vasl.pk" onKeyDown={e=>e.key==="Enter"&&handle()}/></FF>
      <FF label="Password"><input type="password" value={pass} onChange={e=>setPass(e.target.value)} style={S.input} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handle()}/></FF>
      {err&&<div style={{fontSize:12,color:"var(--danger)",marginBottom:12,padding:"8px 10px",background:"var(--dangerBg)",borderRadius:6}}>{err}</div>}
      <button onClick={handle} disabled={loading} style={{...S.btn,width:"100%",justifyContent:"center",opacity:loading?0.7:1,marginTop:4}}>{loading?<>{I.spinner} Signing in…</>:"Sign In"}</button>
    </div>
  </div>);
}
/* ── HEADER ── */
function Header({tab,setTab,dark,setDark,onLogout,onShowLog}){
  const[mo,setMO]=useState(false);
  return(<>
    <header className="header-inner" style={{background:"#3c060d",height:"var(--header-h)",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid rgba(191,147,62,0.22)",position:"sticky",top:0,zIndex:100,padding:"0 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <span style={{fontFamily:"var(--font-d)",fontSize:24,color:"#bf933e",fontWeight:600,letterSpacing:2,cursor:"pointer"}} onClick={()=>setTab("tasks")}>وصل</span>
        <span style={{width:1,height:20,background:"rgba(191,147,62,0.28)"}}/>
        <div className="desktop-tabs" style={{display:"flex",gap:2}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"rgba(191,147,62,0.15)":"transparent",border:"none",borderRadius:6,padding:"6px 12px",fontSize:11,fontWeight:tab===t.id?600:400,color:tab===t.id?"#bf933e":"rgba(245,240,230,0.5)",cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s"}}>{t.label}</button>)}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onShowLog} style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(245,240,230,0.4)",padding:4,display:"flex"}}>{I.log}</button>
        <button onClick={()=>setDark(!dark)} style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(245,240,230,0.4)",padding:4,display:"flex"}}>{dark?I.sun:I.moon}</button>
        <button onClick={onLogout} style={{background:"transparent",border:"1px solid rgba(191,147,62,0.2)",borderRadius:5,padding:"5px 12px",fontSize:11,color:"rgba(245,240,230,0.4)",cursor:"pointer"}}>Sign Out</button>
        <button className="mobile-menu-btn" onClick={()=>setMO(!mo)} style={{background:"transparent",border:"none",cursor:"pointer",color:"rgba(245,240,230,0.5)",padding:4,display:"none"}}>{I.menu}</button>
      </div>
    </header>
    {mo&&<div style={{background:"#3c060d",borderBottom:"1px solid rgba(191,147,62,0.15)",padding:"8px 12px",display:"flex",flexWrap:"wrap",gap:4,zIndex:99,position:"sticky",top:"var(--header-h)"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);setMO(false);}} style={{background:tab===t.id?"rgba(191,147,62,0.15)":"transparent",border:"none",borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:tab===t.id?600:400,color:tab===t.id?"#bf933e":"rgba(245,240,230,0.5)",cursor:"pointer"}}>{t.label}</button>)}
    </div>}
  </>);
}
/* ── OVERVIEW TAB ── */
const LC_LABELS={social:"Social",video:"Video",ai:"AI",shopify:"Shopify",assets:"Assets",copy:"Copy",ads:"Ads",ops:"Ops"};
function OverviewTab({data}){
  const{expenses,tasks,launchTasks,orders,calEvents}=data;
  const ym=nowYM();
  const monthSpend=expenses.filter(e=>e.date?.slice(0,7)===ym).reduce((s,e)=>s+Number(e.amount),0);
  const openTasks=tasks.filter(t=>t.status!=="Done").length;
  const overdueTasks=tasks.filter(t=>t.due_date&&t.due_date<today()&&t.status!=="Done");
  const overdueByPerson=TEAM.reduce((acc,n)=>{acc[n]=overdueTasks.filter(t=>t.assigned_to===n).length;return acc;},{});
  const launchDone=launchTasks.filter(t=>t.status==="done").length;
  const launchPct=launchTasks.length?Math.round(launchDone/launchTasks.length*100):0;
  const totalOrders=orders.length;
  const pendingOrders=orders.filter(o=>o.status==="Pending"||o.status==="Confirmed").length;
  const deliveredRev=orders.filter(o=>o.status==="Delivered").reduce((s,o)=>s+Number(o.amount||0),0);
  const codOrders=orders.filter(o=>o.payment_method==="COD").length;
  const prepaidOrders=orders.filter(o=>o.payment_method!=="COD").length;
  const pipeline=["Pending","Confirmed","Dispatched","Delivered","Returned","Cancelled"];
  const pipeCounts=pipeline.reduce((acc,s)=>{acc[s]=orders.filter(o=>o.status===s).length;return acc;},{});
  const pipeColor={Pending:"var(--text3)",Confirmed:"var(--gold)",Dispatched:"#b86200",Delivered:"var(--green)",Returned:"var(--danger)",Cancelled:"var(--text3)"};
  const todayStr=today();
  const weekEnd=new Date();weekEnd.setDate(weekEnd.getDate()+6);

/* ── CRUD TAB (Orders only) ── */
function CrudTab({title,items,setItems,table,fields,statusOptions,userEmail,flash}){
  const[showForm,setSF]=useState(false);const[editItem,setEI]=useState(null);const[search,setSrch]=useState("");const[fStatus,setFS]=useState("All");
  const defaults={};fields.forEach(f=>{defaults[f.key]=f.default||"";});
  const[form,setForm]=useState(defaults);
  const openForm=item=>{if(item){setEI(item);setForm({...defaults,...item});}else{setEI(null);setForm(defaults);}setSF(true);};
  const filtered=items.filter(item=>{
    if(fStatus!=="All"&&item.status!==fStatus)return false;
    if(search){const s=search.toLowerCase();return fields.some(f=>String(item[f.key]||"").toLowerCase().includes(s));}return true;
  });
  const saveItem=async()=>{
    const tf=fields.find(f=>f.required);if(tf&&!form[tf.key]?.trim())return;
    if(editItem){await sb.from(table).update(form).eq("id",editItem.id);setItems(prev=>prev.map(x=>x.id===editItem.id?{...x,...form}:x));flash(`${title.replace(/s$/,"")} updated.`);logActivity("Updated",title,form[fields[0].key],userEmail);}
    else{const entry={...form,id:uid(),created_at:new Date().toISOString()};await sb.from(table).insert(entry);setItems(prev=>[entry,...prev]);flash(`${title.replace(/s$/,"")} added.`);logActivity("Created",title,form[fields[0].key],userEmail);}
    setSF(false);setEI(null);
  };
  const deleteItem=async id=>{if(!confirm("Delete?"))return;await sb.from(table).delete().eq("id",id);setItems(prev=>prev.filter(x=>x.id!==id));flash("Deleted.","warn");};
  const vf=fields.filter(f=>f.showInTable!==false);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={S.sec}>{title}</div><button onClick={()=>openForm(null)} style={S.btn}>{I.plus} Add</button>
    </div>
    <div className="filter-bar" style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      <input placeholder="Search…" value={search} onChange={e=>setSrch(e.target.value)} style={{...S.filterSel,flex:1,minWidth:140}}/>
      {statusOptions&&<select value={fStatus} onChange={e=>setFS(e.target.value)} style={S.filterSel}><option value="All">All Status</option>{statusOptions.map(s=><option key={s}>{s}</option>)}</select>}
    </div>
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden"}}>
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <table style={{width:"100%",minWidth:560,borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#3c060d"}}>{vf.map(f=><th key={f.key} style={{...S.th,textAlign:f.align||"left"}}>{f.label}</th>)}<th style={{...S.th,width:60}}> </th></tr></thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={vf.length+1}><EmptyState msg={`No ${title.toLowerCase()} yet.`}/></td></tr>
            :filtered.map((item,i)=><tr key={item.id} style={{background:i%2===0?"transparent":"var(--row)"}}>
              {vf.map(f=><td key={f.key} style={{...S.td,textAlign:f.align||"left",maxWidth:f.maxW||"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {f.key==="amount"?pkr(item[f.key]):f.key==="assigned_to"&&item[f.key]?<div style={{display:"flex",alignItems:"center",gap:5}}><Avatar name={item[f.key]} size={20}/>{item[f.key]}</div>:f.key==="status"?<Badge label={item[f.key]} bg={statusOptions?.indexOf(item[f.key])===statusOptions?.length-1?"var(--green)":"rgba(191,147,62,0.15)"} color={statusOptions?.indexOf(item[f.key])===statusOptions?.length-1?"#f5f0e6":"var(--text)"}/>:String(item[f.key]||"—")}
              </td>)}
              <td style={{...S.td,textAlign:"center"}}>
                <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                  <button onClick={()=>openForm(item)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--gold)",padding:2}}>{I.edit}</button>
                  <button onClick={()=>deleteItem(item.id)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)",padding:2,opacity:0.4}}>{I.trash}</button>
                </div>
              </td>
            </tr>)}
          </tbody>
        </table>
      </div>
      {filtered.length>0&&<div style={{padding:"8px 14px",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--text3)"}}>{filtered.length} {filtered.length===1?"item":"items"}</div>}
    </div>
    <Modal open={showForm} onClose={()=>{setSF(false);setEI(null);}} title={editItem?"Edit":"Add "+title.replace(/s$/,"")}>
      {fields.map(f=><FF key={f.key} label={f.label+(f.required?" *":"")}>
        {f.type==="select"?<select value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={S.select}><option value="">—</option>{f.options.map(o=><option key={o}>{o}</option>)}</select>
        :f.type==="textarea"?<textarea value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={{...S.input,minHeight:60,resize:"vertical"}} placeholder={f.ph||""}/>
        :f.type==="number"?<input type="number" value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={S.input} placeholder={f.ph||"0"}/>
        :<input type={f.type||"text"} value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={S.input} placeholder={f.ph||""}/>}
      </FF>)}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
        <button onClick={()=>{setSF(false);setEI(null);}} style={S.btnO}>Cancel</button>
        <button onClick={saveItem} style={S.btn}>Save</button>
      </div>
    </Modal>
  </div>);
}

    </Modal>

      case "calendar": return <CalendarTab events={calEvents} setEvents={setCalEvents} userEmail={user.email} flash={flash}/>;
      case "launch":   return <LaunchTab launchTasks={launchTasks} setLaunchTasks={setLaunchTasks} userEmail={user.email} flash={flash}/>;
      case "orders":   return <CrudTab title="Orders" items={orders} setItems={setOrders} table="orders" fields={ORDER_FIELDS} statusOptions={["Pending","Confirmed","Dispatched","Delivered","Returned","Cancelled"]} userEmail={user.email} flash={flash}/>;
      case "expenses": return <ExpensesTab expenses={expenses} setExpenses={setExpenses} bankBalance={bankBalance} setBankBalance={setBankBalance} userEmail={user.email} flash={flash}/>;
      case "overview": return <OverviewTab data={{expenses,tasks,launchTasks,orders,calEvents}}/>;
      default:         return <TasksTab tasks={tasks} setTasks={setTasks} userEmail={user.email} flash={flash}/>;
    }
  };
  return(<div style={{background:"var(--bg)",minHeight:"100vh",color:"var(--text)"}}>
    <Header tab={tab} setTab={setTab} dark={dark} setDark={setDark} onLogout={handleLogout} onShowLog={()=>setSL(true)}/>
    <main className="main-content" style={{padding:"24px 32px",maxWidth:1240,margin:"0 auto"}}>{renderTab()}</main>
    <Toast toast={toast}/>
    <ActivityLog open={showLog} onClose={()=>setSL(false)}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
